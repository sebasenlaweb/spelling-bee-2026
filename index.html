<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spelling Bee 2026 — Plan Completo</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:0;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:16px}
.hero{background:#185FA5;border-radius:20px;padding:22px 20px;margin-bottom:16px;color:#fff}
.hero h1{font-size:22px;font-weight:800;margin:0 0 4px}
.hero p{font-size:13px;opacity:.85;margin:0 0 14px}
.progress-bar{background:rgba(255,255,255,.25);border-radius:8px;height:8px;overflow:hidden}
.progress-fill{background:#fff;height:100%;border-radius:8px;transition:width .4s}
.progress-label{font-size:12px;opacity:.8;margin-top:6px}
.section-label{font-size:11px;font-weight:700;color:#6e6e73;text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px 2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.day-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.07);text-decoration:none;color:#1d1d1f;display:block;transition:transform .15s}
.day-card:active{transform:scale(0.97)}
.day-card.locked{opacity:.45;pointer-events:none}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.day-num{font-size:11px;font-weight:700;color:#6e6e73}
.day-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.badge-done{background:#f0fdf4;color:#166534}
.badge-today{background:#185FA5;color:#fff}
.badge-soon{background:#f5f5f7;color:#8e8e93}
.day-theme{font-size:13px;font-weight:700;margin:0 0 4px}
.day-date{font-size:11px;color:#6e6e73;margin:0 0 8px}
.day-words{display:flex;flex-wrap:wrap;gap:4px}
.word-pill{font-size:10px;font-weight:700;font-family:monospace;padding:2px 7px;border-radius:20px;background:#f5f5f7;color:#3a3a3c}
.day-card.review-card{grid-column:1/-1;background:linear-gradient(135deg,#1d1d1f,#3a3a3c);color:#fff}
.day-card.review-card .day-num,.day-card.review-card .day-date{color:rgba(255,255,255,.6)}
.day-card.review-card .word-pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9)}
.bee{font-size:36px;display:block;margin-bottom:8px}
.countdown{background:#fff;border-radius:14px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.count-num{font-size:32px;font-weight:800;color:#185FA5;line-height:1}
.count-label{font-size:12px;color:#6e6e73;line-height:1.4}
.count-title{font-size:14px;font-weight:700;color:#1d1d1f}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <span class="bee">🐝</span>
    <h1>Spelling Bee 2026</h1>
    <p>Colegio Alvernia Bilingüe · Grado First · 50 palabras</p>
    <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
    <div class="progress-label" id="plabel">0 de 12 días completados</div>
  </div>

  <div class="countdown" id="countdown"></div>

  <p class="section-label">Días de práctica — 3 al 14 de mayo</p>
  <div class="grid" id="days-grid"></div>
</div>

<script>
const DAYS=[
  {n:1,date:"May 3",theme:"Salón de clases I",words:["book","pen","pencil","paper","map"],file:"dia1_spelling_bee.html",color:{bg:"#E6F1FB",t:"#0C447C",b:"#185FA5"}},
  {n:2,date:"May 4",theme:"Salón de clases II",words:["desk","chair","board","clock","crayon"],file:"dia2_spelling_bee.html",color:{bg:"#EDE9FE",t:"#4C1D95",b:"#7C3AED"}},
  {n:3,date:"May 5",theme:"Salón de clases III",words:["eraser","table","classroom","picture","computer"],file:"dia3_spelling_bee.html",color:{bg:"#D1FAE5",t:"#064E3B",b:"#059669"}},
  {n:4,date:"May 6",theme:"Mi colegio y amigos",words:["school","class","teacher","friend","name"],file:"dia4_spelling_bee.html",color:{bg:"#FDF4FF",t:"#701A75",b:"#C026D3"}},
  {n:5,date:"May 7",theme:"El jardín",words:["bird","tree","grass","flower","bush"],file:"dia5_spelling_bee.html",color:{bg:"#DCFCE7",t:"#14532D",b:"#16A34A"}},
  {n:6,date:"May 8",theme:"El cielo",words:["cloud","sun","sky","moon","star"],file:"dia6_spelling_bee.html",color:{bg:"#EFF6FF",t:"#1E3A8A",b:"#3B82F6"}},
  {n:7,date:"May 9",theme:"La tierra y el agua",words:["river","ocean","mountain","rock","leaf"],file:"dia7_spelling_bee.html",color:{bg:"#F0FDFA",t:"#134E4A",b:"#0D9488"}},
  {n:8,date:"May 10",theme:"Bichitos y plantas",words:["plant","nest","butterfly","bug","bee"],file:"dia8_spelling_bee.html",color:{bg:"#FEF3C7",t:"#78350F",b:"#D97706"}},
  {n:9,date:"May 11",theme:"Colores y tamaños",words:["blue","green","red","yellow","big","small"],file:"dia9_spelling_bee.html",color:{bg:"#FCE7F3",t:"#831843",b:"#DB2777"}},
  {n:10,date:"May 12",theme:"Números + repaso 1–25",words:["one","two","three","four","+ repaso"],file:"dia10_spelling_bee.html",color:{bg:"#FEFCE8",t:"#713F12",b:"#CA8A04"}},
  {n:11,date:"May 13",theme:"Gran repaso total",words:["todas las","50 palabras"],file:"dia11_spelling_bee.html",color:{bg:"#F1F5F9",t:"#0F172A",b:"#334155"},review:true},
  {n:12,date:"May 14",theme:"Simulacro final 🏆",words:["todas las","50 palabras"],file:"dia12_spelling_bee.html",color:{bg:"#1d1d1f",t:"#fff",b:"#fff"},review:true},
];

const TODAY=new Date();
const BEE_DATE=new Date("2026-05-15");
const diffMs=BEE_DATE-TODAY;
const diffDays=Math.max(0,Math.ceil(diffMs/(1000*60*60*24)));

document.getElementById("countdown").innerHTML=`
  <div class="count-num">${diffDays}</div>
  <div><div class="count-title">días para el Spelling Bee</div><div class="count-label">15 de mayo de 2026 · ¡Tú puedes!</div></div>`;

function getDayStatus(d){
  const dayDate=new Date("2026-05-"+String(d.date.split(" ")[1]).padStart(2,"0"));
  const todayStr=TODAY.toDateString();
  const dayStr=dayDate.toDateString();
  if(dayDate<TODAY&&dayDate.toDateString()!==todayStr)return"done";
  if(dayStr===todayStr)return"today";
  return"soon";
}

const grid=document.getElementById("days-grid");
let done=0;
DAYS.forEach(d=>{
  const status=getDayStatus(d);
  if(status==="done")done++;
  const isReview=d.review;
  const card=document.createElement("a");
  card.href=d.file;
  card.className="day-card"+(isReview?" review-card":"");
  const badgeClass=status==="done"?"badge-done":status==="today"?"badge-today":"badge-soon";
  const badgeText=status==="done"?"✓ Listo":status==="today"?"Hoy":"Próximo";
  card.style.borderTop=`3px solid ${d.color.b}`;
  card.innerHTML=`
    <div class="day-top">
      <span class="day-num">Día ${d.n}</span>
      <span class="day-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="day-theme" style="color:${isReview?"#fff":d.color.t}">${d.theme}</div>
    <div class="day-date">${d.date}</div>
    <div class="day-words">${d.words.map(w=>`<span class="word-pill" style="background:${isReview?"rgba(255,255,255,.12)":""}; color:${isReview?"rgba(255,255,255,.85)":""}">${w}</span>`).join("")}</div>`;
  grid.appendChild(card);
});

const pct=Math.round((done/12)*100);
document.getElementById("pfill").style.width=pct+"%";
document.getElementById("plabel").textContent=`${done} de 12 días completados`;
</script>
</body>
</html>
